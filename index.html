<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas Cloud — UAB FIT</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Contenedor de notificaciones -->
    <div id="notification-container"></div>

    <header>
        <h1>Tareas Colaborativas en Tiempo Real</h1>
        <p class="subtitulo">Cloud Computing — UAB FIT | Tecnologías Emergentes</p>
    </header>
    <main>
        <section class="formulario">
            <h2>Nueva Tarea</h2>
            <input type="text" id="titulo" placeholder="Título de la tarea" required>
            <input type="text" id="responsable" placeholder="Responsable" required>
            <button onclick="agregarTarea()">➕ Agregar Tarea</button>
        </section>

        <section class="lista-tareas">
            <h2>Lista de Tareas <span id="contador">(0)</span></h2>
            <div id="tareas-container">
                <p class="vacio">Cargando tareas...</p>
            </div>
        </section>
    </main>
    
    <script src="app.js"></script>
</body>
</html>
