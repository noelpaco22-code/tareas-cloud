<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas Cloud — UAB FIT</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Contenedor de notificaciones -->
    <div id="notification-container"></div>

    <header>
        <h1>Tareas Colaborativas en Tiempo Real</h1>
        <p class="subtitulo">Cloud Computing — UAB FIT | Tecnologías Emergentes</p>
    </header>
    <main>
        <section class="formulario">
            <h2>Nueva Tarea</h2>
            <input type="text" id="titulo" placeholder="Título de la tarea" required>
            <input type="text" id="responsable" placeholder="Responsable" required>
            <button onclick="agregarTarea()">➕ Agregar Tarea</button>
        </section>

        <section class="lista-tareas">
            <h2>Lista de Tareas <span id="contador">(0)</span></h2>
            <div id="tareas-container">
                <p class="vacio">Cargando tareas...</p>
            </div>
        </section>
    </main>

    <!-- ==================== MODAL PARA EDITAR ==================== -->
    <div id="modal-editar" class="modal">
        <div class="modal-contenido">
            <div class="modal-header">
                <h3>✏️ Editar Tarea</h3>
                <button class="modal-cerrar" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body">
                <label>Título de la tarea</label>
                <input type="text" id="modal-titulo" placeholder="Ej: Hacer el informe">
                
                <label>Responsable</label>
                <input type="text" id="modal-responsable" placeholder="Ej: Noel Paco">
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-guardar" onclick="guardarEdicion()">Guardar cambios</button>
            </div>
        </div>
    </div>

    <!-- ==================== MODAL PARA ELIMINAR ==================== -->
    <div id="modal-eliminar" class="modal">
        <div class="modal-contenido modal-eliminar">
            <div class="modal-header">
                <h3>🗑️ Eliminar Tarea</h3>
                <button class="modal-cerrar" onclick="cerrarModalEliminar()">&times;</button>
            </div>
            <div class="modal-body">
                <p class="mensaje-eliminar">¿Estás seguro de que quieres eliminar esta tarea?</p>
                <p class="tarea-eliminar" id="tarea-eliminar-info"></p>
                <p class="advertencia">⚠️ Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
                <button class="btn-confirmar-eliminar" onclick="confirmarEliminar()">Eliminar</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
